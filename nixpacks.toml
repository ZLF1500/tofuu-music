[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "ffmpeg"]

[phases.install]
cmds = [
  "npm ci",
  "npm install -g jsdom",
  "pip install -U yt-dlp --break-system-packages",
  "ln -sf $(which node) /usr/local/bin/node || true",
  "ln -sf $(which node) /usr/bin/node || true",
  "node -e \"require('jsdom')\" && echo 'jsdom OK' || echo 'jsdom MISSING'"
]

[start]
cmd = "node index.js"
